<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RETRO RACER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="horizon">
    <div class="sun"></div>
    <div class="grid"></div>
  </div>

  <div class="cabinet">
    <div class="marquee">
      <span class="marquee-text">RETRO RACER</span>
    </div>

    <div class="screen">
      <canvas id="gameCanvas" width="400" height="600"></canvas>

      <div class="hud">
        <div class="hud-box">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">000000</span>
        </div>
        <div class="hud-box">
          <span class="hud-label">SPEED</span>
          <span id="speed" class="hud-value">000</span>
        </div>
        <div class="hud-box">
          <span class="hud-label">HI-SCORE</span>
          <span id="hiscore" class="hud-value">000000</span>
        </div>
      </div>

      <div class="icon-row">
        <span id="gamepadIndicator" class="icon-badge" title="Controller connected">&#127918;</span>
        <button id="muteBtn" class="icon-badge icon-btn" title="Toggle sound (M)" aria-label="Toggle sound">&#128266;</button>
      </div>

      <div id="startScreen" class="overlay-screen">
        <h1 class="title-glow">RETRO<br>RACER</h1>
        <p class="blink">PRESS ENTER TO START</p>
        <p class="coin-prompt">INSERT COIN</p>
        <p class="instructions">&larr; &rarr; / A&middot;D / D-PAD TO STEER<br>P TO PAUSE &middot; M TO MUTE<br>GRAB <span class="hl-yellow">&#9670;</span> COINS, AVOID TRAFFIC</p>
      </div>

      <div id="gameOverScreen" class="overlay-screen hidden">
        <h1 class="title-glow game-over-text">GAME OVER</h1>
        <p id="finalScore" class="final-score"></p>
        <p id="newHigh" class="new-high hidden">NEW HIGH SCORE!</p>
        <p class="blink">PRESS ENTER TO RETRY</p>
      </div>

      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>

    <div class="touch-controls">
      <button id="leftBtn" class="ctrl-btn" aria-label="Steer left">&larr;</button>
      <button id="rightBtn" class="ctrl-btn" aria-label="Steer right">&rarr;</button>
    </div>

    <div class="cabinet-footer">&copy; 1991 NEON HIGHWAY MOTORS CO.</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
